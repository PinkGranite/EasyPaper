name: CI

on:
  push:
    branches: [master, commercial]
  pull_request:
    branches: [master, commercial]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ".[dev,server]"
      - run: python -m pytest --tb=short -q
