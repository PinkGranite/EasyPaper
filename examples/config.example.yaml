# EasyPaper SDK — Minimal Config Example
# Copy this file to config.yaml and fill in your API keys.
#
#   cp config.example.yaml config.yaml

agents:
  - name: metadata
    model:
      model_name: gpt-4o          # or any OpenAI-compatible model
      api_key: YOUR_API_KEY
      base_url: https://api.openai.com/v1

  - name: writer
    model:
      model_name: gpt-4o
      api_key: YOUR_API_KEY
      base_url: https://api.openai.com/v1
    writer_config:
      max_review_iterations: 2
      enable_review: true
      enable_tools: true
      available_tools:
        - validate_citations
        - count_words
        - check_key_points

  - name: reviewer
    model:
      model_name: gpt-4o
      api_key: YOUR_API_KEY
      base_url: https://api.openai.com/v1

  - name: planner
    model:
      model_name: gpt-4o
      api_key: YOUR_API_KEY
      base_url: https://api.openai.com/v1

tools:
  enabled: true
  available_tools:
    - validate_citations
    - count_words
    - check_key_points
  max_react_iterations: 3

  # Docling deep-analysis (optional, requires `pip install easypaper[docling]`)
  # When enabled, auto-downloads open-access PDFs of core references
  # and parses full text for richer LLM analysis.
  # docling:
  #   enabled: true
  #   device: "auto"          # auto / cpu / cuda / mps
  #   do_ocr: false
  #   do_table_structure: true
  #   cleanup_after_analysis: true

  # Exemplar (benchmark) paper analysis (optional)
  # When enabled, selects a published paper matching the target venue,
  # decomposes its writing patterns, and injects structural/stylistic
  # guidance into every stage of paper generation.
  # Requires Docling to be installed for full-text parsing.
  # exemplar:
  #   enabled: true
  #   prefer_core_refs: true        # check core refs before external search
  #   venue_match_required: true    # exemplar must match target venue
  #   recency_years: 5             # max age of exemplar paper
  #   max_external_candidates: 10  # candidates from external search
  #   max_analysis_chars: 8000     # max chars sent to LLM for analysis
